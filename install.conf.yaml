- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.condarc: conda/condarc.symlink
    ~/.config/starship.toml:
        create: true
        path: starship/starship.toml.symlink
    ~/.cursor/sandbox.json:
        create: true
        path: cursor/sandbox.json.symlink
    ~/.claude/settings.json:
        create: true
        path: claude/settings.json.symlink
    ~/.gitconfig: git/gitconfig.symlink
    ~/.gitconfig.local: git/gitconfig.local.symlink
    ~/.gitignore: git/gitignore.symlink
    ~/.gnupg/gpg.conf: gpg/gpg.conf.symlink
    ~/.gnupg/gpg-agent.conf: gpg/gpg-agent.conf.symlink
    ~/.hgrc: hg/hgrc.symlink
    ~/.hgrc.local: hg/hgrc.local.symlink
    ~/.pypirc: pypi/pypirc.symlink
    ~/.ssh/config:
        create: true
        path: ssh/config.symlink
    ~/.vimrc: vim/vimrc.symlink
    ~/.zshenv: zsh/zshenv.symlink
    ~/.zshrc: zsh/zshrc.symlink
    ~/.zprofile: zsh/zprofile.symlink
